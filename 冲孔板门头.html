<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冲孔铝板门头生成器 · 古月AI</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Microsoft YaHei",sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f2027,#2c5364,#1c1c1c);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px;
}

/* 标题 */
.title{
  font-size:34px;
  font-weight:bold;
  background:linear-gradient(90deg,#00f2fe,#4facfe,#43e97b);
  -webkit-background-clip:text;
  color:transparent;
  margin-bottom:10px;
}

.subtitle{
  opacity:.8;
  margin-bottom:25px;
}

/* 输入区 */
.input-box{
  width:90%;
  max-width:900px;
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  font-size:16px;
}

button{
  padding:14px 22px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;
  cursor:pointer;
  font-weight:bold;
  transition:.3s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* 输出区 */
.result{
  width:90%;
  max-width:1100px;
  margin-top:25px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* 卡片 */
.card{
  padding:16px;
  border-radius:14px;
  background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  position:relative;
  line-height:1.6;
  transition:.3s;
}

.card:hover{
  transform:translateY(-4px);
}

/* 复制按钮 */
.copy{
  position:absolute;
  top:10px;
  right:10px;
  font-size:12px;
  padding:6px 10px;
  border-radius:6px;
  background:linear-gradient(135deg,#ff7e5f,#feb47b);
  cursor:pointer;
}

::-webkit-scrollbar{
  width:6px;
}
::-webkit-scrollbar-thumb{
  background:#888;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="title">冲孔铝板门头生成器</div>
<div class="subtitle">古月AI智能体 · 可施工 · 专业级门头方案</div>

<div class="input-box">
  <input id="input" placeholder="请输入：行业 + 门头名称 + 需求（例：餐饮 火锅店 巴蜀火锅 年轻化 夜市风）">
  <button onclick="generate()">生成方案</button>
</div>

<div class="result" id="result"></div>

<script>

function generate(){
  const input = document.getElementById("input").value;
  if(!input){
    alert("请输入完整需求");
    return;
  }

  const result = document.getElementById("result");
  result.innerHTML = "";

  const holes = [
    "渐变圆孔","规则方孔","六边形蜂窝孔","大小不一圆孔组合",
    "不规则艺术孔","线性排布孔洞","密集微孔","渐变六边形孔",
    "波浪孔洞排列","交错几何孔"
  ];

  const colors = [
    "哑光黑+暖光透出","深灰+白色背板","香槟金+暖光","墨绿色+金色字体",
    "深蓝色+冷白光","咖啡色+暖黄光","拉丝金+白光","红色+暖光透出",
    "橙色+白光","品牌定制色+渐变灯光"
  ];

  const fonts = [
    "现代黑体发光字","圆角发光字体","轻奢细衬线字","工业风字体",
    "不锈钢背发光字","亚克力通体发光字","不锈钢包边字",
    "悬浮背光字","极简发光字","立体金属字"
  ];

  const slogans = [
    "城市烟火气","好吃不贵","年轻人的聚集地","一口上瘾",
    "潮流新地标","越吃越香","品质生活","热辣来袭",
    "生活有滋味","烟火人间"
  ];

  for(let i=0;i<20;i++){

    let text = `
${input}，冲孔铝板门头设计，采用${holes[i%10]}，${colors[i%10]}配色，
白天自然光环境，门头正立面完整展示，正面平视视角，无透视畸变，无任何遮挡，
真实商业街场景，比例合理，
冲孔铝板面层结合龙骨结构支撑+内衬灯箱基层+不锈钢包边结构，
具备通透感与层次感，形成自然透光效果，
搭配${fonts[i%10]}，
门头包含品牌名称+主营品类+标语「${slogans[i%10]}」，
文字主次分明（品牌40%-50%，品类10%-20%，标语5%），排版均衡清晰，
发光字开启+冲孔透光效果柔和不过曝，
氟碳喷涂+微砂质感工艺，
8K高清，商业写实效果图，细节真实，可直接施工参考，店铺正立面完全展示
    `;

    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = text + `<div class="copy" onclick="copyText(this)">复制</div>`;

    result.appendChild(div);
  }
}

function copyText(btn){
  const text = btn.parentNode.innerText.replace("复制","");
  navigator.clipboard.writeText(text);

  btn.innerText="已复制";
  setTimeout(()=>{
    btn.innerText="复制";
  },2000);
}

</script>

</body>
</html>
