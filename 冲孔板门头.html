<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古月AI · 冲孔铝板门头生成器（施工级Pro）</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei";
    background:linear-gradient(135deg,#0f2027,#2c5364,#1a1a2e,#16213e);
    background-size:400% 400%;
    animation:bgMove 15s infinite ease;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    color:#fff;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:100%;
    max-width:1600px;
    border-radius:28px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(30px);
    box-shadow:0 30px 100px rgba(0,0,0,0.7);
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.08);
}

.header{
    padding:30px;
    background:linear-gradient(90deg,#00c6ff,#0072ff,#00c6ff);
    background-size:200% 200%;
    animation:flow 6s linear infinite;
}

@keyframes flow{
    0%{background-position:0%}
    100%{background-position:100%}
}

.header h1{font-size:34px;font-weight:800;}
.header p{opacity:.9;margin-top:8px}

.main{display:flex;}

.left{
    width:380px;
    padding:30px;
    border-right:1px solid rgba(255,255,255,0.08);
}

input{
    width:100%;
    padding:14px;
    margin-bottom:14px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    color:#fff;
}

input:focus{
    outline:none;
    box-shadow:0 0 0 2px #00c6ff;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:#fff;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-4px);
    box-shadow:0 15px 40px rgba(0,150,255,0.6);
}

.right{
    flex:1;
    padding:30px;
    max-height:800px;
    overflow:auto;
}

.item{
    background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
    padding:22px;
    border-radius:18px;
    margin-bottom:15px;
    position:relative;
    transition:.3s;
}

.item:hover{
    transform:translateY(-6px);
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.copy{
    position:absolute;
    right:15px;
    bottom:15px;
    background:#00c6ff;
    border:none;
    color:#fff;
    padding:6px 14px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <div class="header">
        <h1>🔷 古月AI · 冲孔铝板门头生成器</h1>
        <p>冲孔结构逻辑 · 多孔型变化 · 20组完全不同 · 真实施工级方案</p>
    </div>

    <div class="main">
        <div class="left">
            <input id="input" placeholder="输入：行业 + 门头名称（例：餐饮店 食味记）">
            <button onclick="generate()">生成20组方案</button>
        </div>

        <div class="right" id="output"></div>
    </div>
</div>

<script>
function generate(){
    let val=document.getElementById("input").value.trim();
    if(!val){val="餐饮店 食味记";}
    
    let [industry,name]=val.split(" ");
    if(!name){name="食味记";}

    const colors=[
        "暖米色+暖光透光","哑光黑+暖光透出","深灰+冷白光","香槟金+柔光",
        "玫瑰金+暖光","墨绿色+金属拉丝","深蓝+冷光","橙色+暖光透光",
        "红色+暖光","咖啡色+暖光","浅灰+白光","藏蓝+冷光",
        "品牌定制色+透光背板","深棕色+暖光","银灰+白光","黑金搭配+暖光",
        "暖灰+透光","浅米色+柔光","深绿+暖光","蓝灰+冷光"
    ];

    const holes=[
        "规则圆孔阵列","渐变圆孔排列","方孔矩阵","六边形蜂窝孔",
        "不规则艺术冲孔","线性排列冲孔","大小渐变孔洞","密集细孔设计",
        "疏密变化孔洞","横向渐变孔","纵向渐变孔","几何拼接孔洞",
        "局部冲孔装饰","整面冲孔透光","边缘渐变孔","中心聚焦孔洞",
        "对称排列孔洞","随机艺术孔","菱形孔阵列","细密科技孔"
    ];

    let html="";

    for(let i=0;i<20;i++){
        let p=`白天自然光，${industry}门头正立面完整展示，正面平视视角，无透视畸变无遮挡，真实商业街环境。冲孔铝板门头设计，采用${holes[i]}形式，体现通透感与层次变化。整体颜色为${colors[i]}方案，表面氟碳喷涂与微砂质感处理。冲孔铝板面层结合内衬基层与灯光背板结构，透光效果真实自然。不锈钢包边收口，结构合理。搭配亚克力字、不锈钢字与背发光字组合。品牌名称“${name}”为视觉核心，占比最大，主营品类“${industry}”辅助信息，标语点缀说明，整体排版均衡清晰，字体采用现代黑体或工业风字体。白天发光字开启，冲孔透光柔和不过曝。8K高清商业写实效果图，细节真实，色彩自然，可直接施工参考。`;

        html+=`
        <div class="item">
            ${p}
            <button class="copy" onclick="copyText(this)">复制</button>
        </div>`;
    }

    document.getElementById("output").innerHTML=html;
}

function copyText(btn){
    const text=btn.parentNode.innerText.replace("复制","");
    navigator.clipboard.writeText(text);
    btn.innerText="已复制";
    setTimeout(()=>btn.innerText="复制",1000);
}
</script>

</body>
</html>
